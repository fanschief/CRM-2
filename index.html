<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員動態週期分眾系統 (Three-Column Terminal)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0b1120;
            color: #f8fafc;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.05), transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.05), transparent 40%);
            background-attachment: fixed;
        }

        .tech-font { font-family: 'JetBrains Mono', monospace; }

        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .drop-zone {
            border: 2px dashed rgba(100, 116, 139, 0.5);
            transition: all 0.2s ease;
            background: rgba(15, 23, 42, 0.5);
        }

        .drop-zone.dragover, .drop-zone:hover {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.05);
        }

        .drop-zone.has-file {
            border-style: solid;
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }

        .checkbox-wrapper input:checked + div {
            background-color: #8b5cf6;
            border-color: #8b5cf6;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col">

    <header class="mb-8 text-center">
        <h1 class="text-3xl md:text-5xl font-black tracking-wider mb-2 text-white flex items-center justify-center gap-3">
            <svg class="w-10 h-10 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            SEGMENT_<span class="text-sky-400">MASTER</span>
        </h1>
        <p class="text-slate-400 font-light tracking-wide">三欄位智慧提取：會員電話、卡號、UUID 一次就緒</p>
    </header>

    <div class="max-w-7xl mx-auto w-full flex flex-col gap-6">

        <div class="glass-panel rounded-2xl p-6 md:p-8 border-t-4 border-t-sky-500">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                    <label class="block text-sm text-sky-400 mb-2 font-bold tech-font">計算基準日 (今天)</label>
                    <input type="date" id="baseDate" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-sky-500 tech-font">
                </div>
                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                    <label class="block text-sm text-sky-400 mb-2 font-bold tech-font">單一週期天數</label>
                    <input type="number" id="cycleDays" value="45" min="1" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-sky-500 tech-font">
                </div>
                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                    <label class="block text-sm text-sky-400 mb-2 font-bold tech-font">分眾深度</label>
                    <select id="maxR" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-sky-500 tech-font cursor-pointer">
                        <option value="1">R1</option>
                        <option value="2">R2</option>
                        <option value="3" selected>R3</option>
                        <option value="4">R4</option>
                        <option value="5">R5</option>
                        <option value="6">R6</option>
                    </select>
                </div>
                <div class="bg-violet-900/20 p-4 rounded-xl border border-violet-500/30 flex flex-col justify-center">
                    <label class="block text-sm text-violet-400 mb-2 font-bold tech-font">包含潛水客</label>
                    <label class="flex items-center cursor-pointer checkbox-wrapper group">
                        <input type="checkbox" id="includeAll" checked class="hidden">
                        <div class="w-6 h-6 border-2 border-slate-500 rounded bg-slate-900 flex items-center justify-center transition-colors group-hover:border-violet-400">
                            <svg class="w-4 h-4 text-white opacity-0 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <span class="ml-3 text-sm text-slate-300 group-hover:text-white transition-colors">設為「全會員名單」</span>
                    </label>
                </div>
            </div>
            <button onclick="generatePipeline()" class="mt-4 w-full bg-slate-800 hover:bg-slate-700 border border-slate-600 text-sky-400 font-bold py-2 rounded-lg transition-colors">套用日期配置</button>
        </div>

        <div class="glass-panel rounded-2xl p-6 md:p-8 border-t-4 border-t-indigo-500">
            <div id="uploadGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>
        </div>

        <button id="processBtn" onclick="executeProcessing()" class="w-full bg-gradient-to-r from-sky-600 to-violet-600 hover:from-sky-500 hover:to-violet-500 text-white font-black py-5 rounded-2xl text-xl shadow-[0_0_20px_rgba(56,189,248,0.2)] transition-all transform hover:-translate-y-1">
            啟動交叉分析與提取資料
        </button>

        <div id="loadingUI" class="hidden text-center py-8 glass-panel rounded-2xl">
            <div class="flex flex-col items-center justify-center gap-4 text-sky-400 tech-font text-lg">
                <svg class="animate-spin h-12 w-12" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <span id="loadingMsg">多欄位資料比對中，請稍候...</span>
            </div>
        </div>
    </div>

    <div id="resultModal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="glass-panel w-full max-w-7xl max-h-[90vh] flex flex-col rounded-2xl border-sky-500/50 p-6 relative overflow-hidden">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors z-10 bg-slate-800 rounded-full p-1"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            <div class="flex-shrink-0 mb-6"><h2 class="text-3xl font-black text-white mb-2">💎 精準分眾提取完成！</h2><p class="text-slate-400 text-sm">已自動提取電話、卡號、UUID 三項資料，並排除重疊客群：</p></div>
            <div id="resultGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 overflow-y-auto pb-4 pr-2 flex-grow content-start"></div>
        </div>
    </div>

    <script>
        let pipelineConfig = []; 
        let finalBlobs = [];     
        const els = {
            baseDate: document.getElementById('baseDate'),
            cycleDays: document.getElementById('cycleDays'),
            maxR: document.getElementById('maxR'),
            includeAll: document.getElementById('includeAll'),
            uploadGrid: document.getElementById('uploadGrid'),
            resultGrid: document.getElementById('resultGrid')
        };

        function init() {
            const today = new Date();
            els.baseDate.value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            els.includeAll.addEventListener('change', (e) => {
                e.target.nextElementSibling.querySelector('svg').style.opacity = e.target.checked ? '1' : '0';
            });
            els.includeAll.nextElementSibling.querySelector('svg').style.opacity = els.includeAll.checked ? '1' : '0';
            generatePipeline();
        }

        function parseLocalDate(dStr) {
            if (!dStr) return new Date();
            const parts = dStr.split('-');
            return parts.length === 3 ? new Date(parts[0], parts[1] - 1, parts[2]) : new Date(dStr);
        }

        function formatMMDD(dStr) {
            const d = parseLocalDate(dStr);
            return `${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}`;
        }

        function formatDate(dateObj) {
            return `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;
        }

        function generatePipeline() {
            const baseStr = els.baseDate.value;
            const cycle = parseInt(els.cycleDays.value) || 45;
            const maxR = parseInt(els.maxR.value) || 3;
            const hasAll = els.includeAll.checked;
            if(!baseStr) return;
            const baseDateObj = parseLocalDate(baseStr);
            pipelineConfig = []; 
            for (let i = 1; i <= maxR; i++) {
                const d = new Date(baseDateObj);
                d.setDate(baseDateObj.getDate() - (cycle * i));
                pipelineConfig.push({ id: `R${i}`, operator: '>=', dateVal: formatDate(d), colorTheme: 'sky', file: null });
            }
            if (hasAll) {
                pipelineConfig.push({ id: `R_ALL`, operator: 'ALL', dateVal: '', colorTheme: 'violet', file: null });
            } else {
                const d = new Date(baseDateObj); d.setDate(baseDateObj.getDate() - (cycle * maxR) - 1);
                pipelineConfig.push({ id: `R_HIST`, operator: '<=', dateVal: formatDate(d), colorTheme: 'rose', file: null });
            }
            renderUploadBoxes();
        }

        function renderUploadBoxes() {
            els.uploadGrid.innerHTML = '';
            pipelineConfig.forEach((cfg) => {
                const theme = cfg.colorTheme === 'violet' ? { bg: 'bg-violet-900/10', text: 'text-violet-400' } : { bg: 'bg-slate-800/80', text: 'text-sky-400' };
                const card = document.createElement('div');
                card.className = `${theme.bg} rounded-xl p-5 border border-slate-700 fade-in flex flex-col transition-all duration-300 ${cfg.file ? 'border-emerald-500/50' : ''}`;
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3"><div class="text-lg font-bold text-white">${cfg.id} 條件</div><div class="text-xs ${theme.text} tech-font font-bold">MODE: ${cfg.operator}</div></div>
                    <div class="bg-slate-900 p-3 rounded-lg mb-4 border border-slate-700">
                        <select onchange="updateNode('${cfg.id}', 'operator', this.value)" class="w-full bg-slate-800 text-white text-xs rounded px-2 py-1 mb-2">
                            <option value=">=" ${cfg.operator === '>=' ? 'selected' : ''}>大於等於 (>=)</option>
                            <option value="<=" ${cfg.operator === '<=' ? 'selected' : ''}>小於等於 (<=)</option>
                            <option value="ALL" ${cfg.operator === 'ALL' ? 'selected' : ''}>全會員</option>
                        </select>
                        <input type="date" onchange="updateNode('${cfg.id}', 'dateVal', this.value)" value="${cfg.dateVal}" class="w-full bg-slate-800 text-white text-xs rounded px-2 py-1 ${cfg.operator === 'ALL' ? 'hidden' : ''}">
                    </div>
                    <div class="drop-zone rounded-lg p-3 text-center cursor-pointer min-h-[5rem] flex flex-col items-center justify-center relative ${cfg.file ? 'has-file' : ''}" onclick="document.getElementById('file_${cfg.id}').click()">
                        <span class="text-xs ${cfg.file ? 'text-emerald-400 font-bold' : 'text-slate-400'} px-1 truncate w-full">${cfg.file ? cfg.file.name : '點擊上傳 CSV'}</span>
                        <input type="file" id="file_${cfg.id}" accept=".csv" class="hidden" onchange="handleFileChange('${cfg.id}', this.files[0])">
                    </div>
                `;
                els.uploadGrid.appendChild(card);
            });
        }

        function updateNode(id, key, value) {
            const idx = pipelineConfig.findIndex(c => c.id === id);
            if(idx > -1) { pipelineConfig[idx][key] = value; renderUploadBoxes(); }
        }

        function handleFileChange(id, file) {
            const idx = pipelineConfig.findIndex(c => c.id === id);
            if(idx > -1) { pipelineConfig[idx].file = file; renderUploadBoxes(); }
        }

        // --- 核心資料讀取邏輯 ---
        function readCSVToData(file) {
            return new Promise((resolve, reject) => {
                Papa.parse(file, {
                    header: true, skipEmptyLines: true, dynamicTyping: false,
                    complete: function(results) {
                        const rows = [];
                        if (results.data.length > 0) {
                            const keys = Object.keys(results.data[0]);
                            const colCard = keys.find(k => k.includes('卡號') || k.includes('Member_Card') || k.includes('編號'));
                            const colPhone = keys.find(k => k.includes('電話') || k.includes('手機') || k.includes('Mobile') || k.includes('Phone'));
                            const colUUID = keys.find(k => k.includes('UUID') || k.includes('唯一碼') || k.includes('Unique_ID'));

                            if (!colCard && !colPhone && !colUUID) { reject(new Error(`[${file.name}] 找不到任何可辨識的會員欄位(卡號/電話/UUID)`)); return; }

                            results.data.forEach(row => {
                                const p = (colPhone ? row[colPhone] : "")?.toString().trim() || "";
                                const c = (colCard ? row[colCard] : "")?.toString().trim() || "";
                                const u = (colUUID ? row[colUUID] : "")?.toString().trim() || "";
                                
                                if (p || c || u) {
                                    rows.push({
                                        '會員電話': p ? '\t' + p : "",
                                        '會員卡號': c ? '\t' + c : "",
                                        'UUID': u
                                    });
                                }
                            });
                        }
                        resolve(rows);
                    },
                    error: reject
                });
            });
        }

        async function executeProcessing() {
            const validConfigs = pipelineConfig.filter(c => c.file);
            const baseStr = els.baseDate.value;
            if (validConfigs.length === 0) { alert('請至少上傳一個檔案！'); return; }

            document.getElementById('processBtn').classList.add('hidden');
            document.getElementById('loadingUI').classList.remove('hidden');

            try {
                const parsedArrays = await Promise.all(validConfigs.map(c => readCSVToData(c.file)));
                finalBlobs = [];
                const resultData = [];
                
                // 升級：使用三個獨立的 Set 來做「多維度去重」
                let seenPhones = new Set();
                let seenCards = new Set();
                let seenUUIDs = new Set();

                for (let i = 0; i < validConfigs.length; i++) {
                    const currentRows = parsedArrays[i];
                    const filteredRows = [];

                    currentRows.forEach(row => {
                        const p = row['會員電話'].replace('\t', '').trim();
                        const c = row['會員卡號'].replace('\t', '').trim();
                        const u = row['UUID'].trim();

                        // 只要有任何一個欄位在前面的層級(或同層前面)出現過，就視為重疊客
                        let isDup = false;
                        if (p && seenPhones.has(p)) isDup = true;
                        if (c && seenCards.has(c)) isDup = true;
                        if (u && seenUUIDs.has(u)) isDup = true;

                        if (!isDup) {
                            filteredRows.push(row);
                            // 立即加入防重複池中
                            if (p) seenPhones.add(p);
                            if (c) seenCards.add(c);
                            if (u) seenUUIDs.add(u);
                        }
                    });

                    // 檔名日期推算
                    const currCfg = validConfigs[i];
                    let dateRangeStr = "";
                    if (currCfg.operator === 'ALL') {
                        dateRangeStr = "深度流失與從未消費";
                    } else if (i === 0) {
                        dateRangeStr = `${formatMMDD(currCfg.dateVal)}-${formatMMDD(baseStr)}`;
                    } else {
                        const prevDate = parseLocalDate(validConfigs[i-1].dateVal);
                        prevDate.setDate(prevDate.getDate() - 1); // 上一層日期的前一天
                        dateRangeStr = `${formatMMDD(currCfg.dateVal)}-${String(prevDate.getMonth()+1).padStart(2,'0')}${String(prevDate.getDate()).padStart(2,'0')}`;
                    }

                    const fileName = `[獨立分眾]_${currCfg.id}_${dateRangeStr}`;
                    const csv = Papa.unparse(filteredRows);
                    finalBlobs.push({ blob: new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' }), name: fileName });

                    resultData.push({ id: currCfg.id, title: fileName, count: filteredRows.length });
                }

                renderResults(resultData);
            } catch (error) { alert(error.message); } finally {
                document.getElementById('processBtn').classList.remove('hidden');
                document.getElementById('loadingUI').classList.add('hidden');
            }
        }

        function renderResults(dataArray) {
            els.resultGrid.innerHTML = '';
            dataArray.forEach((res, index) => {
                const card = document.createElement('div');
                card.className = `rounded-xl p-5 border border-slate-700 bg-slate-900/50 flex flex-col group transition-all`;
                card.innerHTML = `
                    <div class="text-sm text-sky-400 tech-font font-bold mb-1">${res.id} 產出結果</div>
                    <div class="text-xs text-slate-300 font-bold mb-4 break-all">${res.title}</div>
                    <div class="text-4xl font-black text-white mb-6 tech-font">${res.count.toLocaleString()} <span class="text-sm font-normal text-slate-500">人</span></div>
                    <button onclick="downloadBlob(${index})" class="mt-auto w-full bg-slate-800 hover:bg-slate-700 text-white border border-slate-600 py-3 rounded-lg font-bold transition-all">下載 CSV</button>
                `;
                els.resultGrid.appendChild(card);
            });
            document.getElementById('resultModal').classList.remove('hidden');
        }

        function downloadBlob(index) {
            const item = finalBlobs[index];
            const url = URL.createObjectURL(item.blob);
            const a = document.createElement('a');
            a.href = url; a.download = `${item.name}.csv`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        function closeModal() { document.getElementById('resultModal').classList.add('hidden'); }
        init();
    </script>
</body>
</html>
